name: Build and push Docker Image

on:
  schedule:
    - cron: '0 3 * * 6'  # Every Saturday at 03:00 UTC
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/spoolman

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Spoolman fork
        uses: actions/checkout@v4
        with:
          repository: chof747/spoolman  # Replace with your fork's repo
          ref: master

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install client dependencies and build
        run: |
          pip install pdm
          pdm export -o requirements.txt --without-hashes
          cd client
          npm ci
          echo "VITE_APIURL=/api/v1" > .env.production
          npm run build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU for cross-platform builds
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and push Docker image (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ env.GHCR_IMAGE }}:weekly

